name: Backup Turso DB

on:
  schedule:
    - cron: '0 5 * * *'   # 5am UTC = medianoche Colombia (UTC-5)
  workflow_dispatch:       # también ejecutable manualmente desde GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias mínimas
        run: npm install @libsql/client dotenv

      - name: Generar backup
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          FECHA=$(date +%Y-%m-%d)
          mkdir -p backups
          node scripts/backup-db.js > backups/backup-${FECHA}.sql
          echo "Backup generado: backups/backup-${FECHA}.sql"
          wc -l backups/backup-${FECHA}.sql

      - name: Subir backup como artifact (retención 90 días)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90
